<!DOCTYPE html>
<html>
<head>
<title>Risk It All</title>

<style>
body{
  font-family:'Segoe UI',sans-serif;
  text-align:center;
  background: linear-gradient(to right, #ffe0e9, #ffd6cc);
  padding-top:120px;
}

#box{
  background:white;
  width:330px;
  margin:auto;
  padding:30px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

h2{
  color:#ff4d6d;
}

button{
  padding:10px 25px;
  font-size:15px;
  background:#ff4d6d;
  border:none;
  color:white;
  border-radius:20px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#ff3355;
}

#ending{
  margin-top:20px;
  opacity:0;
  transition:1s;
}

.show{
  opacity:1;
}

.big-heart{
  width:100px;
  height:90px;
  position:relative;
  margin:auto;
  transform:rotate(-45deg);
  animation:beat 1s infinite;
}

.big-heart::before,
.big-heart::after{
  content:"";
  position:absolute;
  width:100px;
  height:90px;
  background:#ff4d6d;
  border-radius:50%;
}

.big-heart::before{
  top:-50px;
  left:0;
}

.big-heart::after{
  left:50px;
  top:0;
}

@keyframes beat{
  0%{transform:scale(1) rotate(-45deg);}
  25%{transform:scale(1.2) rotate(-45deg);}
  50%{transform:scale(1) rotate(-45deg);}
  75%{transform:scale(1.2) rotate(-45deg);}
  100%{transform:scale(1) rotate(-45deg);}
}

.for-you{
  font-size:18px;
  margin-top:8px;
  color:#444;
  letter-spacing:2px;
}
</style>
</head>
<body>

<div id="box">
  <h2>Risk It All - Bruno Mars</h2>
  <p id="lirik"></p>
  <button onclick="ok()">OK</button>
  <div id="ending"></div>
</div>

<script>
// Lirik lagu
let kira = 0;
let lagu = [
  "I would swim",
  "across the sea",
  "just to show you",
  "sacrifice my life",
  "just to hold you",
  "I could go on and on",
  "to prove that you belong",
  "here in my arms!!!"
];

// Typing effect
function typeText(text, element){
  let i=0;
  element.innerHTML="";
  let typing = setInterval(function(){
    if(i<text.length){
      element.innerHTML += text.charAt(i);
      i++;
    }else{
      clearInterval(typing);
    }
  },40);
}

// Button OK
function ok(){
  if(kira < lagu.length){
    typeText(lagu[kira], document.getElementById("lirik"));
    document.getElementById("ending").classList.remove("show");
    kira++;
  }
  else{
    // Semua lirik habis → show hopeless romantic heart
    document.getElementById("lirik").innerHTML="";
    document.getElementById("ending").innerHTML =
      "<div class='big-heart'></div><div class='for-you'>for you.</div>";
    document.getElementById("ending").classList.add("show");
    
    // reset untuk mula semula
    kira = 0;
  }
}
</script>

</body>
</html>
