<!DOCTYPE html>
<html>
<head>
<title>Risk It All</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
padding-top:120px;
}

#box{
background:white;
width:320px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
font-size:16px;
background:#ff6b81;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>

</head>
<body>

<div id="box">

<h2 id="tajuk">Risk It All - Bruno Mars</h2>
<p id="lirik"></p>

<button id="btn" onclick="ok()">OK</button>

</div>

<script>

let kira = 0;

let lagu = [
"I would swim",
"across the sea",
"just to show you",
"sacrifice my life",
"just to hold you",
"I could go on and on",
"to prove that you belong",
"here in my armsss"
];

function typeText(text, element){

let i = 0;
element.innerHTML = "";

let typing = setInterval(function(){

if(i < text.length){
element.innerHTML += text.charAt(i);
i++;
}
else{
clearInterval(typing);
}

},40);

}

function ok(){

if(kira < lagu.length){

typeText(lagu[kira], document.getElementById("lirik"));

kira++;

if(kira == lagu.length){
document.getElementById("btn").innerHTML = "Ulang";
}

}

else{

kira = 0;
document.getElementById("lirik").innerHTML = "";
document.getElementById("btn").innerHTML = "OK";

}

}

</script>

</body>
</html>
